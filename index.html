<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>5dplinko.app</title>
  <meta name="description" content="5dplinko.app — multiplayer pot Plinko. Bet SOL, shared pot, live wins." />
  <meta name="theme-color" content="#05070b" />
  <link rel="stylesheet" href="./play.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <header class="top">
    <div class="brand">
      <h1>5d<span>plinko</span>.app</h1>
      <p class="tag">multiplayer pot · VRF bins · shared reserve</p>
    </div>
    <div id="wallet-button"></div>
  </header>

  <main class="layout">
    <section class="stage">
      <div class="vitals">
        <div class="vital"><span class="k">Free pot</span><span class="v" id="statPot">—</span></div>
        <div class="vital"><span class="k">Reserved</span><span class="v" id="statReserved">—</span></div>
        <div class="vital"><span class="k">Drops</span><span class="v" id="statDrops">—</span></div>
        <div class="vital"><span class="k">Volume</span><span class="v" id="statVolume">—</span></div>
      </div>

      <div class="board-wrap">
        <div class="board" id="board">
          <div class="pegs" id="pegs"></div>
          <div class="bins" id="bins"></div>
        </div>
      </div>

      <div class="controls">
        <label class="bet">
          <span>Bet <b id="betValue">0.05 SOL</b></span>
          <input type="range" id="betRange" min="0.01" max="2" step="0.01" value="0.05" />
          <span class="hint">min <span id="betMin">0.01</span> · max <span id="betMax">2</span></span>
        </label>
        <div class="actions">
          <button type="button" class="btn btn--primary" id="btnDrop">Drop ball</button>
          <button type="button" class="btn btn--ghost" id="btnRefresh">Refresh</button>
        </div>
      </div>
      <p class="status" id="statusLine">—</p>
    </section>

    <aside class="rail">
      <h2>Live drops</h2>
      <div class="feed" id="feed"><p class="empty">No drops yet — be first.</p></div>
      <p class="note">
        Shared house pot. Max win reserved before each drop. If pot cannot cover a bin, bet is refunded.
        Mults match classic 9-bin board (×25 edges).
      </p>
    </aside>
  </main>

  <div class="toast" id="toast" role="status"></div>

  <script>
    // Filled after deploy — override with window.PLINKO_CONFIG
    window.PLINKO_CONFIG = window.PLINKO_CONFIG || {
      contractAddress: '0xsbRGSkcCf9GwxGLv',
      apiUrl: 'https://proofnetwork.lol/api',
      apiKey: 'pk_b48a3dcd3dff1e2a936ab5832b6f190a8bace8ec93d17c944b44db63c3a46c91',
      mock: false,
    };
  </script>
  <script src="./vendor/wallet.js"></script>
  <script>
    if (typeof CryptoClient !== 'undefined') window.CryptoClient = CryptoClient;
  </script>
  <script src="./app.js"></script>
</body>
</html>
